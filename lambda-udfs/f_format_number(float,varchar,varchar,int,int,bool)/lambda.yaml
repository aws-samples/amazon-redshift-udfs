AWSTemplateFormatVersion: '2010-09-09'
Resources:
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
          Version: 2012-10-17
          Statement:
            -
              Effect: Allow
              Principal:
                Service:
                  - lambda.amazonaws.com
              Action:
                - sts:AssumeRole
      Path: /
      Policies:
          -
            PolicyName: CloudwatchLogs
            PolicyDocument:
              Version: 2012-10-17
              Statement:
                -
                  Effect: Allow
                  Action:
                    - logs:CreateLogGroup
                  Resource:
                    - !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:*"
                -
                  Effect: Allow
                  Action:
                    - logs:CreateLogStream
                    - logs:PutLogEvents
                  Resource:
                    - !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"
  LambdaUDFFunction:
     Type: "AWS::Lambda::Function"
     Properties:
       FunctionName: f-format-number-float-varchar-varchar-int-int-bool
       Role: !GetAtt 'LambdaRole.Arn'
       Handler: index.handler
       Runtime: python3.12
       Timeout: 300
       Code:
         ZipFile: |
          import json
          from collections import deque
          from math import modf

          def int_grouper_as_string(int_value, group_sep, group_length):
              d = deque(str(int(int_value)))
              grouped = []
              c = 0
              while True:
                  try:
                      x = d.pop()
                  except IndexError:
                      break
                  if c and not c % group_length:
                      grouped.append(group_sep)
                  c += 1
                  grouped.append(x)
              grouped.reverse()
              return ''.join(grouped)

          def get_decimal_as_string(fract_value, precision):
              if precision > 0:
                  prec_string = '{{0:.{precision}f}}'.format(precision=precision)
                  fract_string = prec_string.format(fract_value)
                  return fract_string.split('.')[-1]
              else:
                  return ''

          def format_number(value, group_sep=',', decimal_sep='.', group_length=3,
                            precision=2, sign=False):
              if value is None:
                  return None
              value_float = float(value)
              if value_float < 0:
                  sign_symbol = '-'
              elif sign:
                  sign_symbol = '+'
              else:
                  sign_symbol = ''

              fract_part, int_part = modf(abs(value_float))
              int_group = int_grouper_as_string(int_part, group_sep, group_length)
              dec = get_decimal_as_string(fract_part, precision)

              res = sign_symbol + int_group
              if dec != '':
                  res += decimal_sep + dec
              return res

          def handler(event, context):
              redshift_response = {"success": False, "num_records": event["num_records"]}
              try:
                  result = []
                  for row in event["arguments"]:
                      try:
                          value = row[0]
                          group_sep = row[1] if row[1] is not None else ','
                          decimal_sep = row[2] if row[2] is not None else '.'
                          group_length = int(row[3]) if row[3] is not None else 3
                          precision = int(row[4]) if row[4] is not None else 2
                          sign = bool(row[5]) if row[5] is not None else False
                          if value is None:
                              result.append(None)
                          else:
                              result.append(format_number(value, group_sep, decimal_sep,
                                                         group_length, precision, sign))
                      except Exception as e:
                          print(f"Error processing row: {e}")
                          result.append(None)
                  redshift_response["success"] = True
                  redshift_response["results"] = result
              except Exception as e:
                  redshift_response["error_msg"] = str(e)
              return json.dumps(redshift_response)
