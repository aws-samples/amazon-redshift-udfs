AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  S3Bucket:
    Description: the S3 Bucket containing the Lambda layer
    Type: String
  S3Key:
    Description: the S3 Key containing the Lambda layer
    Type: String
Conditions:
  NoS3Prefix: !Equals [!Ref S3Key, '']
Resources:
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
          Version: 2012-10-17
          Statement:
            -
              Effect: Allow
              Principal:
                Service:
                  - lambda.amazonaws.com
              Action:
                - sts:AssumeRole
      Path: /
      Policies:
          -
            PolicyName: CloudwatchLogs
            PolicyDocument:
              Version: 2012-10-17
              Statement:
                -
                  Effect: Allow
                  Action:
                    - logs:CreateLogGroup
                  Resource:
                    - !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:*"
                -
                  Effect: Allow
                  Action:
                    - logs:CreateLogStream
                    - logs:PutLogEvents
                  Resource:
                    - !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"
  PandasLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      CompatibleRuntimes:
        - python3.12
      Content:
        S3Bucket: !Ref S3Bucket
        S3Key: !If ["NoS3Prefix", "pandas_layer.zip", !Sub "${S3Key}/pandas_layer.zip"]
      Description: Pandas library
      LayerName: pandas
  LambdaUDFFunction:
     Type: "AWS::Lambda::Function"
     Properties:
       FunctionName: f-next-business-day-date
       Role: !GetAtt 'LambdaRole.Arn'
       Handler: index.handler
       Runtime: python3.12
       Layers:
        - !Ref PandasLayer
       Timeout: 300
       Code:
         ZipFile: |
          import json
          import pandas
          from pandas.tseries.offsets import CustomBusinessDay
          from pandas.tseries.holiday import USFederalHolidayCalendar

          bday_us = CustomBusinessDay(calendar=USFederalHolidayCalendar())

          def handler(event, context):
              redshift_response = {"success": False, "num_records": event["num_records"]}
              try:
                  result = []
                  for row in event["arguments"]:
                      try:
                          dt = row[0]
                          if dt is None:
                              result.append(None)
                          else:
                              next_day = pandas.Timestamp(dt) + bday_us
                              result.append(next_day.strftime('%Y-%m-%d'))
                      except Exception as e:
                          print(f"Error processing row: {e}")
                          result.append(None)
                  redshift_response["success"] = True
                  redshift_response["results"] = result
              except Exception as e:
                  redshift_response["error_msg"] = str(e)
              return json.dumps(redshift_response)
